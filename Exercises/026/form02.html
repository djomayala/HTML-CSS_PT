<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form 02</title>
</head>
<body>
    <h1>Form 02</h1>
    <form action="submit2.php" method="get"></form>
    <p>
        <label for="name1">Name</label>
        <input type="text" name="name" id="name1" required minlength="3" maxlength="15" placeholder="Joe">
    </p>
    <p>
        <label for="surname1">Surname</label>
        <input type="text" name="surname" id="surname1" required minlength="3" maxlength="15" size="20" placeholder="Mayala">
    </p>
    <p>
        <label for="password1">Password</label>
        <input type="password" name="password" id="password1" required minlength="3" maxlength="15" placeholder="1234">
    </p>
    <p>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </p>
</body>
</html>
