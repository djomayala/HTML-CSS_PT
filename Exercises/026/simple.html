<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Form</title>
</head>
<body>
    <h1>Simple Form</h1>
    <form action="submit.php" method="post" autocomplete="off">
        <fieldset>
            <legend>Personal Infos</legend>
            <p><label for="name1">Name:</label>
                <input type="text" name="name" id="name1" required value="Joe"></p>
            <p><label for="surname1">Surname:</label>
                <input type="text" name="surname" id="surname1" required value="Mayala"></p>
        </fieldset>
        <fieldset>
            <legend>Contact Details</legend>
            <p>
                <label for="iphone">Phone Number</label>
                <input type="tel" name="phone" id="iphone" value="0027xxx">
            </p>
            <p>
                <label for="email1">Email Adress</label>
                <input type="email" name="email" id="email1">
            </p>
        </fieldset>
        <fieldset>
            <legend>Other Details</legend>
            <p>
                <label for="note1">Note</label>
                <input type="number" name="note" id="note1" min="0" max="10" step="0.5">
            </p>
            <p>
                <label for="date1">Date</label>
                <input type="date" name="date" id="date1">
            </p>
            <p>
                <label for="time1">Time</label>
                <input type="time" name="time" id="time1">
            </p>
            <p>
                <label for="range">Range</label>
                <input type="range" name="range" id="range" min="0" max="10"
                oninput="range1.innerHTML = Number(range.value)">

                <output id="range1">5</output>
            </p>
        </fieldset>
        <fieldset>
            <legend>Gender</legend>
            <p>
                <input type="radio" name="sex" id="imale" value="M" checked><label for="imale">Male</label>
                <input type="radio" name="sex" id="ifemale" value="F"><label for="ifemale">Female</label>
            </p>
        </fieldset>
        <fieldset>
            <legend>Preferences</legend>
            <p>
                <input type="checkbox" name="football" id="ifoot"><label for="ifoot">Football</label><br>
                <input type="checkbox" name="basket" id="basket"><label for="basket">Basketball</label><br>
                <input type="checkbox" name="handball" id="hand"><label for="hand">Handball</label><br>
                <input type="checkbox" name="soccer" id="soccer" checked><label for=soccer">Soccer</label>
            </p>
        </fieldset>
        <fieldset>
            <legend>Selection</legend>
            <label for="state">State</label>
            <select name="state" id="state">
                <option value="" selected>Select</option>
                <optgroup label="Gauteng">
                    <option value="JHB">Johannesburg</option>
                    <option value="PTA">Pretoria</option>
                    <option value="LP">Limpopo</option>
                    <option value="SP">Springs</option>
                </optgroup>
                <optgroup label="KwaZulu Natal">
                    <option value="PT">Pietermaritzburg</option>
                    <option value="DUR">Durban</option>
                    <option value="MP">Mpumalanga</option>
                </optgroup>
            
            </select>
            <label for="suburb">Suburb</label>
            <input type="text" name="suburb" id="suburb" list="list">
            <datalist id="list">
                <option value="Ki">Killarney</option>
                <option value="Ye">Yeoville</option>
                <option value="Be">Berea</option>
            </datalist>
            <p>
                <label for="text">Please send us a message</label><br>
                <textarea name="text" id="text"  cols="30" rows="10"></textarea>
            </p>
                
        </fieldset>
        <p><input type="submit" value="submit"> <input type="reset" value="Reset"></p>
        
    </form>
</body>
</html>
