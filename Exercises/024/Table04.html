<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table 04</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            border-collapse: collapse;
            width: 600px;
        }
        th , td {
            border: 1px solid black;
            padding: 7px;
            text-align: center;
        }
        td {
            font-weight: 700;
        }
        thead {
            background-color: rgba(0, 0, 0, 0.651);
            color: white;
        }
        .Media {
            background-color: rgba(0, 0, 0, 0.651);
            color: white;
        }
        .mid2 {
            text-align: left;
        }
        .Disc {
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>Table 04</h1>
    <table>
        <thead>
            <tr>
                <th rowspan="2" scope="col">Area</th>
                <th rowspan="2" scope="col">Discipline</th>
                <th colspan="2" scope="colgroup">Notes</th>
                <th rowspan="2" scope="col">Media</th>
            </tr>
            <tr>
                <th scope="col">Note 1</th>
                <th scope="col">Note 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="4" scope="rowgroup">Exacts</th>
                <td class="Disc">Mathematics</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td class="Disc">Physics</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td class="Disc">Chymics</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td class="Disc">Biology</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr class="Media">
                <th colspan="4" scope="row" class="mid2">Media of Exacts</th>
                <td>0.0</th>
            </tr>
            <tr>
                <th rowspan="2" scope="rowgroup">Humans</th>
                <td class="Disc">History</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td class="Disc">Geography</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr class="Media">
                <th colspan="4" scope="row" class="mid2">Medias of Humans</th>
                <td>0.0</th>
            </tr>
        </tbody>
    </table>
</body>
</html>
